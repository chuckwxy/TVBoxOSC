name: Build APK Only

on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出当前仓库（用于读取 README.md 中的 commit 记录）
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # 2. 检查上游仓库是否有新提交
      - name: Check New Commit
        id: check_commit
        run: |
          # 上游仓库信息（可改为你自己的复刻源，如果是原仓库则保持 q215613905/TVBoxOS）
          UPSTREAM_USER="q215613905"
          UPSTREAM_REPO="TVBoxOS"
          BRANCH="main"
          UPSTREAM_URL="https://github.com/${UPSTREAM_USER}/${UPSTREAM_REPO}"
          echo "upStream=${UPSTREAM_URL}" >> $GITHUB_ENV

          # 获取最新 commit SHA
          commit=$(curl -s "https://api.github.com/repos/${UPSTREAM_USER}/${UPSTREAM_REPO}/commits/${BRANCH}?per_page=1" | jq -r '.sha')
          if [ -z "$commit" ]; then
            echo "无法获取上游提交信息"
            exit 1
          fi

          # 检查 README.md 是否已记录该 commit，若未记录或强制重建则继续
          if ! grep -q "$commit" README.md || [ "${{ inputs.rebuild }}" == "true" ]; then
            echo "commit=$commit" >> $GITHUB_ENV
            echo "commitS=${commit:0:7}" >> $GITHUB_ENV
          fi
          echo "commit=$commit"

      # 3. 克隆上游源码
      - name: Checkout Source Code
        if: ${{ env.commit }}
        run: |
          git clone ${{ env.upStream }} TVBoxOSC
          cd TVBoxOSC
          git checkout ${{ env.commit }}
          # 生成标签（日期时间）
          echo "tag=$(git log --date=format:'%Y%m%d-%H%M' --pretty=format:%cd ${{ env.commitS }} -1)" >> $GITHUB_ENV

      # 4. 修改版本号和添加依赖源（可选）
      - name: Extra Modify
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          # 修改版本名称
          sed -i "/versionName/s#[0-9a-zA-Z_\.\'\"-]\+\$#\'${{ env.tag }}\'#" app/build.gradle
          sed -i "/android:text=/s#=\"#=\"${{ env.tag }}\\\\n\\\\n#" app/src/main/res/layout/dialog_about.xml
          # 添加 crosswalk 源
          if grep -q 'crosswalk' build.gradle; then
            sed -i "/crosswalk/a\        maven { url 'https://j4uq.github.io/crosswalk/releases/crosswalk/android/maven2' }" build.gradle
          else
            sed -i "/jitpack.io/a\        maven { url 'https://j4uq.github.io/crosswalk/releases/crosswalk/android/maven2' }" build.gradle
          fi

      # 5. 设置 Python（如果项目需要 Chaquopy）
      - name: Setup Python
        if: ${{ env.commit }}
        uses: actions/setup-python@v6
        with:
          python-version: '3.8'

      - name: Install Python dependencies
        if: ${{ env.commit }}
        run: |
          python -m pip install --upgrade pip
          pip install lxml ujson pyquery requests jsonpath cachetools pycryptodome beautifulsoup4

      # 6. 修复 pyramid 模块的 Python 路径（Linux 环境）
      - name: Modify pyramid build.gradle
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          sed -i '/buildPython.*python.exe/d' pyramid/build.gradle

      # 7. 创建空的 local.properties（避免 SDK 路径报错）
      - name: Setup local.properties
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: echo "" > local.properties

      # 8. 配置签名（需确保 .github/workflows/TVBoxOSC.jks 存在）
      - name: Release Apk Sign
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          signingConfigs=''
          signingConfig='ICAgICAgICAgICAgaWYgKHByb2plY3QuaGFzUHJvcGVydHkoIlJFTEVBU0VfU1RPUkVfRklMRSIpKSB7XAogICAgICAgICAgICAgICAgc2lnbmluZ0NvbmZpZyBzaWduaW5nQ29uZmlncy5teUNvbmZpZ1wKICAgICAgICAgICAgfVwK'
          signingConfigs="$(echo "$signingConfigs" |base64 -d )"
          signingConfig="$(echo "$signingConfig" |base64 -d )"
          sed -i -e "/defaultConfig {/i\\$signingConfigs " -e "/debug {/a\\$signingConfig " -e "/release {/a\\$signingConfig " app/build.gradle
          cp -f ${{ github.workspace }}/.github/workflows/TVBoxOSC.jks app/TVBoxOSC.jks
          sed -i '$a\RELEASE_STORE_FILE=./TVBoxOSC.jks'     ./gradle.properties
          sed -i '$a\RELEASE_KEY_ALIAS=TVBoxOSC'            ./gradle.properties
          sed -i '$a\RELEASE_STORE_PASSWORD=TVBoxOSC'       ./gradle.properties
          sed -i '$a\RELEASE_KEY_PASSWORD=TVBoxOSC'         ./gradle.properties

      # 9. 设置 Java（Gradle 7.5 需要 Java 17）
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # 10. 设置 Gradle 缓存
      - name: Setup Gradle
        if: ${{ env.commit }}
        uses: gradle/actions/setup-gradle@v6

      # 11. 构建 Release APK
      - name: Build With Gradle
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          chmod +x gradlew
          ./gradlew assemblerelease --build-cache --parallel --daemon --warning-mode all

      # 12. 整理 APK 文件
      - name: Prepare APK
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          rm -rf apk/
          mkdir -p apk/
          for file in `find ~ -name "*release*.apk" -print`; do
            base=$(basename "$file")
            # 重命名，增加上游用户名和标签
            new_base="TVBox_q215613905_${{ env.tag }}.apk"
            mv "$file" "apk/$new_base"
          done

      # 13. 上传 APK 作为 Artifact（可在 Actions 页面下载）
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        if: ${{ env.commit }}
        with:
          name: TVBoxOS-APK
          path: TVBoxOSC/apk/*.apk

  # 可选：清理旧的构建记录，保留最近 14 天或至少 10 个
  clean:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Delete older workflow runs and artifacts
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 14
          keep_minimum_runs: 10
